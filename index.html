<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для тебе ❤️</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div id="rotate-message">
        Булочка, перегорни екран вертикально для кращого перегляду!<br>
        По іншому тобі нічого не покажуть (🥺🥺🥺)<br>
        <img class="imgRotate" src="./img/rotate-2-512.png" alt="rotate">
    </div>

    <div class="app">

        <!-- start -->

        <div id="start" class="screen">

            <svg class="heart" viewBox="0 0 200 180" id="heartBtn">

                <path d="M100 170
                    L20 80
                    A40 40 0 0 1 100 40
                    A40 40 0 0 1 180 80
                    Z" fill="#ff4d6d" />

                <text x="100" y="95" class="heart-text">
                    Натисни мене
                </text>

            </svg>

        </div>

        <!-- menu -->

        <div id="menu" class="screen hidden">

            <button disabled class="cloud-wrapper">
                <div id="cloudBtn" class="cloud-icon">☁️</div>
            </button>

            <button class="back" id="backBtn">Назад</button>
            
            <button class="star" id="moonBtn" disabled>🌙</button>

            <div class="menu-title">Обери етап ❤️</div>

            <button class="menu-btn" id="quizBtn">Міні-квест</button>
            <button class="menu-btn" id="btn24" disabled>24</button>
            <button class="menu-btn" id="btnShe" disabled>Вона</button>
            <button class="menu-btn" id="greetingBtn" disabled>Торкнутись душі</button>

            <img id="img-bth" src="https://media.tenor.com/bh9MAiCpL6wAAAAi/birthday-cake.gif" alt="Тортик">

        </div>

        <!-- quiz -->
        
        <div id="quiz" class="screen hidden">
        
            <button class="back" id="quizBack">Назад</button>
        
            <div class="quiz-container">
        
                <div id="question" class="quiz-question"></div>
        
                <div id="answers" class="quiz-answers"></div>
        
                <div id="result" class="quiz-result"></div>
        
                <button id="nextBtn" class="menu-btn" disabled>Далі</button>
        
            </div>
        
        </div>

        <!-- wish24 -->

        <div id="wishes24Screen" class="screen hidden">
        
            <button class="back" id="wishes24Back">Назад</button>
        
            <div class="wishes24-title">24 побажання</div>
        
            <div id="wishCardContainer">
                <div id="wishNumber" class="wish-number"></div>
                <div id="wishText" class="wish24-card"></div>
            </div>
        
            <button id="wishNextBtn" class="menu-btn">Далі</button>
        
        </div>

        <!-- sheCards -->
        <div id="sheScreen" class="screen hidden">
        
            <button class="back" id="sheBack">Назад</button>
        
            <div class="she-title">Не забувай, хто ти є ✨</div>
        
            <div id="sheCards" class="she-cards"></div>
        
            <div class="she-hint">Свайпни або натисни на картку</div>
        
            <div class="music-controls">
                <button id="playPauseBtn" class="music-btn"><img src="./img/start.svg" alt="start"></button>
                <button id="restartMusicBtn" class="music-btn"><img src="./img/reload.svg" alt="reload"></button>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.3">
            </div>
        
        </div>

        <!-- greeting -->
        <div id="greetingScreen" class="screen hidden">

            <div class="rain-bg"></div>
        
            <button class="back" id="greetingBack">Назад</button>
        
            <div class="greeting-container">
                <div class="greeting-title">З Днем Народження 🎉</div>

                <div id="finalGreetingScrollBox">
                    <div id="finalGreetingText"></div>
                </div>

                <button id="thanksBtn" class="lastWishBtn">Дякую</button>
            </div>
        
        </div>

        <div id="starsScreen" class="screen hidden">

            <div class="rain-bg"></div>
        
            <button class="star" id="sunBtn">☀️</button>
        
            <div class="star-title">Серед мільйонів і мільйонів зірок існуєш єдина на світі Ти ✨</div>
        
        </div>
    </div> 
    <script type="module" src="js/main.js"></script>
</body>

</html>
